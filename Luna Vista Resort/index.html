<!DOCTYPE html>
<html>
<head>
<title>Luna Vista Resort</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f5f9fc;
}

/* Header */

header {
    background-color: #0d3b66;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h1 {
    color: white;
    margin: 0;
}

/* Navigation */

nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
}

nav a:hover {
    text-decoration: underline;
}

/* User display */

#userDisplay {
    color: #f4a261;
    margin-left: 20px;
    font-weight: bold;
}


.hero{
position:relative;
height:90vh;
overflow:hidden;
}

.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

.hero-content{
position:relative;
color:white;
text-align:center;
top:50%;
transform:translateY(-50%);
}

.btn{
background:#f4a261;
padding:12px 25px;
border:none;
color:white;
cursor:pointer;
}

.section{
padding:60px;
text-align:center;
}

footer{
background:#0d3b66;
color:white;
text-align:center;
padding:15px;
}

</style>
</head>

<body>

<header>

<h1>Luna Vista Resort</h1>

<nav>

<a href="index.html">Home</a>
<a href="rooms.html">Rooms</a>

<a href="contact.html">Contact</a>
<a href="about.html">About</a>
<a href="account.html">Account</a>

</nav>

</header>

<section class="hero">

<video width="100" autoplay muted loop>

<source src="videos/resort.mp4" type="video/mp4">
Your browser does not support the video tag.
</video>

<div class="hero-content">

<h2>Escape to Paradise</h2>

<p>Luxury beachfront living</p>

<button class="btn" onclick="location.href='reservation.html'">
Book Your Stay
</button>

</div>

</section>

<section class="section">

<h2>Welcome to Luna Vista Resort</h2>

<p>Experience world class hospitality and breathtaking ocean views.</p>

</section>

<footer>

© 2026 Luna Vista Resort

</footer>

</body>
</html>
