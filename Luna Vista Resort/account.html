<!DOCTYPE html>
<html>
<head>
<title>My Account | Luna Vista</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
   background:url("images/biyatch.jpeg") center/cover no-repeat;

}

/* Header */

header {
    background-color: #0d3b66;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h1 {
    color: white;
    margin: 0;
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
}

nav a:hover {
    text-decoration: underline;
}

/* Section */

.section{
display:flex;
justify-content:center;
padding:80px 20px;
}



/* Profile Card */

.profile-box{
background: rgba(255,255,255,0.2);
backdrop-filter: blur(12px);
border: 1px solid rgba(255,255,255,0.3);
padding:40px;
width:350px;
border-radius:15px;

text-align:center;

box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.profile-icon{
font-size:60px;
margin-bottom:20px;
color:#0d3b66;
}

.info{
margin:15px 0;
color:#444;
}

button{
width:100%;
padding:12px;

background:#0d3b66;
color:white;
border:none;
border-radius:8px;

cursor:pointer;
}

button:hover{
background:#0a2d4f;
}

footer{
background:#0d3b66;
color:white;
text-align:center;
padding:20px;
margin-top:60px;
}

</style>
</head>

<body>

<header>
<h1>Luna Vista Resort</h1>
<nav>
<a href="index.html">Home</a>
<a href="rooms.html">Rooms</a>
<a href="amenities.html">Amenities</a>
<a href="reservation.html">Reservation</a>
<a href="contact.html">Contact</a>
<a href="about.html">About</a>
<a href="account.html">Account</a>
</nav>
</header>

<section class="section">

<div class="profile-box">

<div class="profile-icon">👤</div>

<h2>My Account</h2>

<div class="info" id="userEmail">User: Loading...</div>

<button onclick="logout()">Logout</button>

</div>

</section>

<footer>
© 2026 Luna Vista Resort
</footer>

<script>

/* Load user data */

window.onload=function(){

let user=localStorage.getItem("user");

if(user){
document.getElementById("userEmail").innerText=
"User: "+user;
}
else{
document.getElementById("userEmail").innerText=
"Not logged in";
}

}

/* Logout */

function logout(){

localStorage.removeItem("user");

alert("Logged out");

window.location="login.html";

}

</script>

</body>
</html>
